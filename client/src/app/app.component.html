@let content = i18n.content();
@if (i18n.loading()) {
  <div class="loadbar" aria-hidden="true"></div>
}
<sd-nav />
<sd-channel-header />
<sd-tabs-bar />

<div class="main">
  <router-outlet />
</div>

@if (isHome()) {
  <div class="konami">
    <b>{{ content.konamiTip }}</b> {{ content.konamiKeys }}
  </div>
}

<sd-mini-player />

<!-- Mobile-only floating theme + language dock (the desktop nav owns these on wider screens). -->
<div class="prefs-dock">
  <sd-prefs />
</div>
