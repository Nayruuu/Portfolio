name: Deploy - API

on:
  workflow_dispatch:
  # Push auto-trigger is OFF during the mono-commit/force-push phase (force-push bypasses
  # path filters → every workflow would run on each push). Re-enable with normal git history:
  # push:
  #   branches: [main]
  #   paths: [api/**]

env:
  IMAGE: ghcr.io/nayruuu/super-dev-api

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write # Azure OIDC login
      contents: read
      packages: write # push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Points the Container App at the freshly pushed image. The image must be
      # public on GHCR (so Container Apps pulls it without registry credentials),
      # or a registry secret must be configured on the app. ca-api / rg-infra-web come
      # from infra/ (Terraform).
      - name: Update Container App
        run: |
          az containerapp update \
            --name ca-api \
            --resource-group rg-infra-web \
            --image ${{ env.IMAGE }}:${{ github.sha }}
