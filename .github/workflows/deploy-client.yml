name: Deploy - Client

on:
  workflow_dispatch:
  # The front auto-deploys on every push to main. No `paths:` filter on purpose: in the
  # mono-commit/force-push phase a force-push replaces history, so GitHub's path filtering is
  # unreliable (it sees every file as changed) — and every mono-commit carries `client/` anyway.
  # infra/api keep their `push:` triggers OFF so a force-push never fires a destructive Terraform
  # apply or container deploy. Re-add `paths: [client/**]` once the repo uses normal git history.
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write # Azure OIDC login
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build SSG
        working-directory: client
        run: |
          npm ci
          npm run build:ssg

      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli@latest

      # The SWA deploy token is fetched at runtime via OIDC — no stored secret.
      - name: Fetch SWA deployment token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name swa-sd-web \
            --resource-group rg-infra-web \
            --query "properties.apiKey" -o tsv)
          echo "SWA_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Deploy with SWA CLI
        working-directory: client
        run: |
          swa deploy dist/super-dev-portfolio/browser \
            --deployment-token "$SWA_TOKEN" \
            --env production
